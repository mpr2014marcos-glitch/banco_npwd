<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Banco PIX</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; background: transparent; }
      #app { padding: 12px; }
      .card { background: rgba(24, 24, 28, 0.75); border-radius: 14px; padding: 14px; backdrop-filter: blur(6px); color: #fff; }
      .title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
      .row { display: flex; gap: 8px; align-items: center; margin: 6px 0; }
      .row label { flex: 1; font-size: 14px; opacity: 0.85; }
      .row input { flex: 2; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; }
      .row button { padding: 8px 12px; border-radius: 8px; border: none; background: #3b82f6; color: #fff; cursor: pointer; }
      .row button:hover { background: #2563eb; }
      .divider { height: 1px; background: rgba(255,255,255,0.15); margin: 10px 0 12px; }
      .status { margin-top: 8px; font-size: 13px; min-height: 18px; }
      .balance { margin-top: 6px; font-size: 14px; font-weight: 600; }
      .muted { opacity: 0.85; font-size: 13px; }
      .actions { display: flex; gap: 8px; }
      .history { margin-top: 10px; max-height: 140px; overflow-y: auto; font-size: 13px; }
      .history-item { display: flex; justify-content: space-between; padding: 6px 8px; border-radius: 8px; background: rgba(255,255,255,0.06); margin-bottom: 6px; }
      .toasts { position: fixed; right: 16px; bottom: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
      .toast { border-radius: 10px; padding: 10px 12px; color: #fff; font-size: 13px; box-shadow: 0 6px 24px rgba(0,0,0,0.25); }
      .toast-success { background: #22c55e; }
      .toast-error { background: #ef4444; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="card">
        <div class="title">Banco • PIX</div>
        <div class="muted" id="profile">Carregando perfil...</div>
        <div class="balance" id="balance">Saldo: carregando...</div>
        <div class="muted" id="coins" style="display:none;">Moedas: 0</div>
        <div class="divider"></div>
        <div class="row">
          <label for="pixCode">Meu código (6 dígitos)</label>
          <input id="pixCode" maxlength="6" inputmode="numeric" pattern="\\d{6}" />
          <div class="actions">
            <button id="btnRegister">Cadastrar</button>
            <button id="btnRandom" title="Gerar e cadastrar aleatório">Aleatório</button>
            <button id="btnDelete" title="Apagar minha chave">Apagar</button>
          </div>
        </div>
        <div class="row">
          <label for="toCode">Transferir para código</label>
          <input id="toCode" maxlength="6" inputmode="numeric" pattern="\\d{6}" />
        </div>
        <div class="row">
          <label for="amount">Valor</label>
          <input id="amount" type="number" min="1" />
          <button id="btnTransfer">Enviar</button>
        </div>
        <div class="divider"></div>
        <div class="muted">Histórico</div>
        <div class="history" id="history"></div>
        <div class="status" id="status"></div>
      </div>
    </div>
    <div id="toasts" class="toasts"></div>
    <script src="./app.js"></script>
  </body>
</html>
